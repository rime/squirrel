# Rime schema settings
# encoding: utf-8

schema:
  schema_id: flypydz
  name: 反查单字
  version: "1"

switches:
  - name: ascii_mode
    reset: 0
    states: [ CN, EN ]
    
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: '/;zyxwvutsrqponmlkjihgfedcba'
  initials: 'abcdefghijklmnopqrstuvwxyz;'
  finals: '/'
  #delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: ^;.$|^\w{4}$
  algebra:
    - derive/^.(.*)$/`$1/
    - derive/^(.).(.*)$/$1`$2/
    - derive/^(..).(.*)$/$1`$2/
    - derive/^(...).$/$1`/

translator:
  dictionary: flypydz
  # 明确禁用所有其他数据源
  enable_charset_filter: false
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false
  # 不继承任何父配置
  inherit: false
  preedit_format:
    - xform/^`(.*)/$1/

# 添加反查配置，确保只使用 flypydz 字典
reverse_lookup:
  dictionary: flypydz
  # 不继承任何配置
  inherit: false
  # 明确禁用所有其他数据源
  enable_user_dict: false
  enable_sentence: false
  enable_completion: false
  enable_charset_filter: false
  enable_encoder: false
  # 添加过滤器，排除任何包含以 ok 开头的编码
  filter: '^(?!.*\bok)'
  comment_format:
    - xform/ / /
